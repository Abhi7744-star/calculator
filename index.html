<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: #020617;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* FULL FIX */
.container {
  width: 100%;
  max-width: 360px;
  padding: 10px;
}

/* Calculator */
.calculator {
  width: 100%;
  padding: 15px;
  border-radius: 20px;
  background: #0f172a;
}

/* Display */
.display {
  width: 100%;
  height: 80px;
  font-size: 26px;
  text-align: right;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 15px;
  border: none;
  background: #020617;
  color: #00f5ff;
  overflow-x: auto;
}

/* Grid */
.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

/* Buttons */
button {
  width: 100%;
  height: 60px;
  border: none;
  border-radius: 15px;
  font-size: 18px;
  color: white;
}

/* Colors */
.red { background: #ef4444; }
.orange { background: #f97316; }
.blue { background: #3b82f6; }
.equal {
  background: #00f5ff;
  grid-column: span 2;
  color: black;
}

/* REMOVE SCROLL ISSUE */
html, body {
  overflow: hidden;
}
</style>
</head>

<body>

<div class="container">

  <div class="calculator">
    <input type="text" id="display" class="display" disabled>

    <div class="buttons">
      <button class="red" onclick="clearDisplay()">AC</button>
      <button class="orange" onclick="backspace()">⌫</button>
      <button class="orange" onclick="append('/')">÷</button>
      <button class="orange" onclick="append('*')">×</button>

      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>
      <button class="orange" onclick="append('-')">−</button>

      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>
      <button class="orange" onclick="append('+')">+</button>

      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>
      <button class="blue" onclick="append('%')">%</button>

      <button onclick="append('0')">0</button>
      <button onclick="append('.')">.</button>
      <button class="equal" onclick="calculate()">=</button>
    </div>
  </div>

</div>

<script>
function append(val) {
  let d = document.getElementById("display");
  d.value += val;
  d.scrollLeft = d.scrollWidth;
}

function clearDisplay() {
  document.getElementById("display").value = "";
}

function backspace() {
  let d = document.getElementById("display");
  d.value = d.value.slice(0, -1);
}

function calculate() {
  let d = document.getElementById("display");
  try {
    d.value = eval(d.value);
  } catch {
    alert("Invalid");
  }
}
</script>

</body>
</html>
